<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Token Logo Quiz</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 48px 20px;
        background:
          radial-gradient(circle at 15% 15%, rgba(130, 95, 255, .16), transparent 28%),
          radial-gradient(circle at 85% 80%, rgba(84, 196, 255, .14), transparent 25%),
          #f7f6fb;
        color: #17152b;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      main {
        display: grid;
        max-width: 1040px;
        margin: auto;
        grid-template-columns: 1fr 460px;
        gap: 70px;
        align-items: center;
      }
      h1 { max-width: 520px; margin: 10px 0 16px; font-size: clamp(42px, 7vw, 72px); line-height: .98; letter-spacing: -.07em; }
      p { max-width: 500px; color: #706d84; font-size: 17px; line-height: 1.6; }
      .label { color: #6c4cff; font-size: 13px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }
      code { padding: 3px 6px; border-radius: 5px; background: #eae6fa; color: #5137db; }
      @media (max-width: 850px) {
        main { grid-template-columns: 1fr; gap: 36px; }
        iq-token-quiz { margin: auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <div class="label">IQ.wiki Mini Game</div>
        <h1>How well do you know crypto?</h1>
        <p>A lightweight token logo quiz built for the IQ.wiki homepage. It has no framework dependencies and can be embedded with one script tag and <code>&lt;iq-token-quiz&gt;</code>.</p>
      </div>
      <iq-token-quiz rounds="5"></iq-token-quiz>
    </main>
    <script src="./iq-token-quiz.js"></script>
  </body>
</html>
