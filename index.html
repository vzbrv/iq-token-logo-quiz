<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Token Logo Quiz</title>
    <meta name="description" content="Test how well you know crypto projects by their logos in the IQ.wiki Token Logo Quiz.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vzbrv.github.io/iq-token-logo-quiz/">
    <meta property="og:title" content="IQ.wiki Token Logo Quiz">
    <meta property="og:description" content="500 crypto logos. How many can you identify before time runs out?">
    <meta property="og:image" content="https://vzbrv.github.io/iq-token-logo-quiz/social-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="IQ.wiki Token Logo Quiz">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="IQ.wiki Token Logo Quiz">
    <meta name="twitter:description" content="500 crypto logos. How many can you identify before time runs out?">
    <meta name="twitter:image" content="https://vzbrv.github.io/iq-token-logo-quiz/social-preview.png">
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 32px 20px 64px;
        background: radial-gradient(circle at 12% 12%, rgba(255, 71, 157, .22), transparent 25%), radial-gradient(circle at 88% 72%, rgba(255, 71, 157, .12), transparent 26%), #080709;
        color: #f8f3f6;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
        background-size: 48px 48px;
        content: "";
        mask-image: linear-gradient(to bottom, black, transparent 85%);
      }
      header {
        display: flex;
        max-width: 1160px;
        margin: 0 auto 54px;
        align-items: center;
        justify-content: space-between;
        font-weight: 800;
      }
      header span { color: #ff479d; }
      header a { color: #aaa1a8; font-size: 13px; text-decoration: none; }
      main {
        display: grid;
        max-width: 1260px;
        margin: auto;
        grid-template-columns: minmax(300px, .8fr) minmax(500px, 680px);
        gap: 72px;
        align-items: center;
      }
      h1 { max-width: 560px; margin: 18px 0; font-size: clamp(48px, 6vw, 82px); line-height: .92; letter-spacing: -.07em; }
      h1 span { color: #ff479d; }
      p { max-width: 510px; color: #aaa1a8; font-size: 16px; line-height: 1.65; }
      .label { display: inline-block; padding: 7px 10px; border: 1px solid rgba(255,71,157,.35); border-radius: 4px; background: rgba(255,71,157,.08); color: #ff75b6; font-size: 11px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
      .proof { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; }
      .proof span { padding: 8px 11px; border: 1px solid #2e292d; border-radius: 999px; background: rgba(255,255,255,.035); color: #c7bec4; font-size: 11px; font-weight: 800; }
      @media (max-width: 850px) {
        header { margin-bottom: 44px; }
        main { grid-template-columns: 1fr; gap: 36px; }
        iq-token-quiz { margin: auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <header>
      <div><span>IQ</span>.wiki</div>
      <a href="https://iq.wiki" target="_blank" rel="noopener noreferrer">Explore IQ.wiki →</a>
    </header>
    <main>
      <div>
        <div class="label">IQ.wiki Mini Game</div>
        <h1>Recognize the <span>signal.</span></h1>
        <p>A fast, unforgiving test of crypto knowledge. Identify IQ.wiki projects, build a streak, learn after every answer, then challenge your friends.</p>
        <div class="proof"><span>500 IQ.wiki projects</span><span>4 run formats</span><span>999-level endless mode</span></div>
      </div>
      <iq-token-quiz levels="999"></iq-token-quiz>
    </main>
    <script src="./iq-token-quiz.js"></script>
  </body>
</html>
