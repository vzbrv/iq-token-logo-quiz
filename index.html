<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Token Logo Quiz</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 32px 20px 64px;
        background: radial-gradient(circle at 15% 10%, #ffe1ef 0, transparent 28%), radial-gradient(circle at 90% 80%, #f8dff0 0, transparent 30%), #f8f5fa;
        color: #15111e;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      header {
        display: flex;
        max-width: 1160px;
        margin: 0 auto 54px;
        align-items: center;
        justify-content: space-between;
        font-weight: 800;
      }
      header span { color: #ff5ca8; }
      header a { color: #666; font-size: 13px; text-decoration: none; }
      main {
        display: grid;
        max-width: 1220px;
        margin: auto;
        grid-template-columns: 1fr minmax(500px, 620px);
        gap: 64px;
        align-items: center;
      }
      h1 { max-width: 560px; margin: 14px 0 18px; font-size: clamp(46px, 6vw, 76px); line-height: .98; letter-spacing: -.065em; }
      p { max-width: 510px; color: #707070; font-size: 17px; line-height: 1.65; }
      .label { display: inline-block; padding: 7px 10px; border: 1px solid #ffd5e8; border-radius: 8px; background: #fff5fa; color: #d92f7d; font-size: 12px; font-weight: 800; }
      .proof { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; }
      .proof span { padding: 8px 11px; border: 1px solid #e8dfe9; border-radius: 999px; background: rgba(255,255,255,.7); color: #5f5667; font-size: 11px; font-weight: 800; }
      @media (max-width: 850px) {
        header { margin-bottom: 44px; }
        main { grid-template-columns: 1fr; gap: 36px; }
        iq-token-quiz { margin: auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <header>
      <div><span>IQ</span>.wiki</div>
      <a href="https://iq.wiki" target="_blank" rel="noopener noreferrer">Explore IQ.wiki →</a>
    </header>
    <main>
      <div>
        <div class="label">IQ.wiki Mini Game</div>
        <h1>Think you know crypto by sight?</h1>
        <p>Race the clock through IQ.wiki-listed projects. The logos get smaller, the clock gets faster, and every miss becomes something new to learn.</p>
        <div class="proof"><span>500 IQ.wiki projects</span><span>4 run formats</span><span>999-level endless mode</span></div>
      </div>
      <iq-token-quiz levels="999"></iq-token-quiz>
    </main>
    <script src="./iq-token-quiz.js"></script>
  </body>
</html>
