<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Token Logo Quiz</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 32px 20px 64px;
        background: #fff;
        color: #161616;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      header {
        display: flex;
        max-width: 1160px;
        margin: 0 auto 72px;
        align-items: center;
        justify-content: space-between;
        font-weight: 800;
      }
      header span { color: #ff5ca8; }
      header a { color: #666; font-size: 13px; text-decoration: none; }
      main {
        display: grid;
        max-width: 1160px;
        margin: auto;
        grid-template-columns: 1fr 460px;
        gap: 80px;
        align-items: center;
      }
      h1 { max-width: 560px; margin: 14px 0 18px; font-size: clamp(42px, 6vw, 64px); line-height: 1.03; letter-spacing: -.055em; }
      p { max-width: 510px; color: #707070; font-size: 17px; line-height: 1.65; }
      .label { display: inline-block; padding: 7px 10px; border: 1px solid #ffd5e8; border-radius: 8px; background: #fff5fa; color: #d92f7d; font-size: 12px; font-weight: 800; }
      @media (max-width: 850px) {
        header { margin-bottom: 44px; }
        main { grid-template-columns: 1fr; gap: 36px; }
        iq-token-quiz { margin: auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <header>
      <div><span>IQ</span>.wiki</div>
      <a href="https://iq.wiki" target="_blank" rel="noopener noreferrer">Explore IQ.wiki →</a>
    </header>
    <main>
      <div>
        <div class="label">IQ.wiki Mini Game</div>
        <h1>How well do you know crypto?</h1>
        <p>Race the clock to identify IQ.wiki-listed projects from full or partial logos. Use lifelines carefully, build streaks, and review missed tokens on IQ.wiki.</p>
      </div>
      <iq-token-quiz levels="999"></iq-token-quiz>
    </main>
    <script src="./iq-token-quiz.js"></script>
  </body>
</html>
